name: Build and Deploy Wisecow

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/wisecow

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build and Push Docker Image
  # ─────────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image pushed successfully
        run: |
          echo "✅ Docker image built and pushed!"
          echo "Image: ${{ env.IMAGE_NAME }}:latest"
          echo "SHA tag: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"

  # ─────────────────────────────────────────
  # JOB 2: Deploy to Kubernetes (local)
  # ─────────────────────────────────────────
  deploy-instructions:
    name: Deploy Instructions
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Print deployment instructions
        run: |
          echo "=================================="
          echo "  Image ready on Docker Hub! ✅   "
          echo "=================================="
          echo ""
          echo "To deploy to your local cluster:"
          echo "kubectl set image deployment/wisecow \
            wisecow=${{ env.IMAGE_NAME }}:latest \
            -n wisecow"
          echo ""
          echo "kubectl rollout status deployment/wisecow -n wisecow"
