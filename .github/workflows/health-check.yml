name: Application Health Check

on:
  # Run every 30 minutes
  schedule:
    - cron: '*/30 * * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  health-check:
    name: Check Application Health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > $HOME/.kube/config

      - name: Check Pod Health
        run: |
          echo "=== Checking Pod Status ==="
          kubectl get pods -n wisecow

          # Check if all pods are running
          READY=$(kubectl get deployment wisecow \
            -n wisecow \
            -o jsonpath='{.status.readyReplicas}')

          if [ "$READY" -lt 1 ]; then
            echo "❌ No pods ready! Deployment is down!"
            exit 1
          else
            echo "✅ $READY pods are ready and running"
          fi

      - name: Check Certificate Health
        run: |
          echo "=== Checking TLS Certificate ==="
          kubectl get certificate -n wisecow

          CERT_READY=$(kubectl get certificate wisecow-tls \
            -n wisecow \
            -o jsonpath='{.status.conditions[0].status}')

          if [ "$CERT_READY" != "True" ]; then
            echo "❌ Certificate is not ready!"
            exit 1
          else
            echo "✅ TLS Certificate is valid"
          fi

      - name: Summary
        run: |
          echo "================================"
          echo "   Health Check Complete ✅     "
          echo "================================"
          kubectl get all -n wisecow
